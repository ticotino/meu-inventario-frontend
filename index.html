<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var theme = window.localStorage.getItem("meu-inventario:theme");
          if (theme === "light" || theme === "dark") {
            document.documentElement.setAttribute("data-theme", theme);
          }
        } catch (error) {
          // Sem preferência salva ou sem acesso ao localStorage: prefers-color-scheme decide.
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Controle de matérias-primas, produção, pedidos e romaneios em um só fluxo." />
    <title>Meu Inventário</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
